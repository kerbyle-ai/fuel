<!DOCTYPE html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a73e8" />
    <title>Карта АЗС — офлайн</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        background: #f5f5f5;
        color: #1f2937;
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        text-align: center;
      }
      .card {
        background: #fff;
        border-radius: 16px;
        padding: 32px 24px;
        max-width: 360px;
        box-shadow: 0 4px 24px rgba(0, 0, 0, 0.08);
      }
      h1 { font-size: 20px; margin-bottom: 12px; color: #1a73e8; }
      p { font-size: 14px; line-height: 1.5; color: #6b7280; margin-bottom: 20px; }
      button {
        background: #1a73e8;
        color: #fff;
        border: none;
        border-radius: 8px;
        padding: 12px 24px;
        font-size: 15px;
        cursor: pointer;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>⛽ Нет подключения</h1>
      <p>Карта АЗС недоступна без интернета. Проверьте соединение и попробуйте снова.</p>
      <button onclick="location.reload()">Обновить</button>
    </div>
  </body>
</html>
