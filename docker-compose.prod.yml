# Production override для VPS (Timeweb и др.)
# Запуск: docker compose -f docker-compose.yml -f docker-compose.prod.yml up -d --build
#
# Безопасность:
# - PostgreSQL НЕ проброшен на хост (только внутри docker network)
# - API на 127.0.0.1:3001 (localhost; nginx — публичный фронт)
# - telegram-bot: network_mode host → исходящий HTTPS как с хоста (обход Docker NAT ETIMEDOUT)
# - nginx слушает 0.0.0.0:80, 8090, 8888 — публичный доступ по IP

services:
  db:
    ports: !reset []

  api:
    ports:
      - "127.0.0.1:3001:3001"
    environment:
      NODE_ENV: production
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-https://your-domain.ru}

  nginx:
    ports:
      - "0.0.0.0:80:80"
      - "0.0.0.0:${NGINX_PORT:-8090}:80"
      - "0.0.0.0:8888:80"

  telegram-bot:
    network_mode: host
    environment:
      API_URL: http://127.0.0.1:3001/api
