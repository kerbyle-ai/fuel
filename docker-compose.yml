services:
  db:
    image: ${POSTGIS_IMAGE:-postgis/postgis:16-3.4}
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fuelmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-fuelmap_secret}
      POSTGRES_DB: ${POSTGRES_DB:-fuelmap}
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./backend/migrations:/docker-entrypoint-initdb.d:ro
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "pg_isready -U ${POSTGRES_USER:-fuelmap} -d ${POSTGRES_DB:-fuelmap}",
        ]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fuelmap}:${POSTGRES_PASSWORD:-fuelmap_secret}@db:5432/${POSTGRES_DB:-fuelmap}
      DB_HOST: db
      DB_PORT: 5432
      NODE_ENV: ${NODE_ENV:-production}
      API_PORT: ${API_PORT:-3001}
      RATE_LIMIT_MAX: ${RATE_LIMIT_MAX:-30}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-3600000}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${API_PORT:-3001}:3001"
    restart: unless-stopped

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-/api}
        VITE_DONATION_URL: ${VITE_DONATION_URL:-}
    ports:
      - "${NGINX_PORT:-8090}:80"
    depends_on:
      - api
    restart: unless-stopped

  telegram-bot:
    profiles: ["telegram"]
    build:
      context: ./telegram-bot
      dockerfile: Dockerfile
    environment:
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      API_URL: http://api:3001/api
      WEB_APP_URL: ${WEB_APP_URL:-http://localhost:8090}
      TELEGRAM_CHANNEL_URL: ${TELEGRAM_CHANNEL_URL:-https://t.me/toplivo99}
      TELEGRAM_NOTIFY_CHANNEL_ID: ${TELEGRAM_NOTIFY_CHANNEL_ID:-}
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

  # One-shot: docker compose --profile importer run --rm price-importer
  price-importer:
    profiles: ["importer"]
    build:
      context: ./scripts
      dockerfile: Dockerfile.importer
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-fuelmap}:${POSTGRES_PASSWORD:-fuelmap_secret}@db:5432/${POSTGRES_DB:-fuelmap}
      BENZIN_COOKIES_FILE: ${BENZIN_COOKIES_FILE:-data/benzin-cookies3.txt}
      BENZIN_DEBUG_DIR: /tmp/benzin-debug
    depends_on:
      db:
        condition: service_healthy
    restart: "no"

volumes:
  pgdata:
